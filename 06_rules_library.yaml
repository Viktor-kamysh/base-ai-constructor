version: 1
rules:
  - id: terrace_waterproofing_bundle
    trigger:
      any_of:
        - terrace
        - roof_terrace
        - balcony
    expected_related_items:
      - waterproofing
      - slope_layer_or_fall
      - drainage_solution
      - edge_details
      - penetration_sealing
    note: "Presence of terrace-like scope should trigger review for waterproofing bundle completeness."

  - id: facade_insulation_bundle
    trigger:
      any_of:
        - facade_insulation
        - etics
        - exterior_insulation
    expected_related_items:
      - insulation_boards
      - adhesive_or_fixing
      - anchors_if_required
      - reinforcement_mesh
      - basecoat
      - finish_render
      - trims_and_profiles
    note: "Facade insulation is often incomplete when trims, anchors, or mesh are omitted."

  - id: demolition_bundle
    trigger:
      any_of:
        - demolition
        - removal
        - dismantling
    expected_related_items:
      - debris_handling
      - transport
      - disposal
      - protection_measures
      - final_cleaning
    note: "Demolition packages often miss logistics and disposal."

  - id: window_installation_bundle
    trigger:
      any_of:
        - windows
        - external_doors
        - glazing
    expected_related_items:
      - installation
      - sealing
      - flashing_or_finish_edges
      - adjustment
      - accessory_materials
    note: "Openings often appear in estimate without complete installation accessories or sealing details."

  - id: tile_finish_bundle
    trigger:
      any_of:
        - tile_finish
        - ceramic_tile
        - bathroom_tile
    expected_related_items:
      - substrate_preparation
      - waterproofing_if_wet_area
      - adhesive
      - grout
      - silicone_or_edge_finish
    note: "Tile systems are often quoted partially."
